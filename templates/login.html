<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход — Project Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            font-family: 'Inter', sans-serif;
        }
        .auth-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 32px;
            max-width: 420px;
            width: 100%;
        }
        .auth-card h2 { font-weight: 700; margin-bottom: 24px; color:#0f172a; }
        .form-label { font-weight: 500; font-size: 13px; color:#475569; }
        .btn-primary {
            background:#2563eb; border:none; border-radius:8px; padding:10px;
            font-weight:500;
        }
        .btn-primary:hover { background:#1d4ed8; }
        .logo {
            width: 56px; height: 56px; border-radius: 12px;
            background:#2563eb; color:#fff;
            display:flex; align-items:center; justify-content:center;
            font-size:26px; margin: 0 auto 16px;
        }
        .flash-msg { font-size: 13px; }
        .toggle-link { font-size: 13px; color:#2563eb; text-decoration:none; font-weight:500; }
        .toggle-link:hover { text-decoration:underline; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="logo"><i class="bi bi-bar-chart-steps"></i></div>
    <h2 class="text-center" id="formTitle">Вход в систему</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="alert alert-{{ category }} flash-msg">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Форма входа -->
    <form method="POST" action="{{ url_for('login') }}" id="loginForm">
        <div class="mb-3">
            <label class="form-label">Логин</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right"></i> Войти</button>
    </form>

    {% if enable_registration %}
    <div class="text-center mt-3">
        <a href="#" class="toggle-link" onclick="toggleForm(); return false;" id="toggleLink">
            Нет аккаунта? Зарегистрируйтесь
        </a>
    </div>

    <!-- Форма регистрации -->
    <form method="POST" action="{{ url_for('register') }}" id="registerForm" style="display:none;">
        <div class="mb-3">
            <label class="form-label">Логин</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-control" minlength="6" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Роль</label>
            <select name="role" class="form-select">
                <option value="executor" selected>Исполнитель</option>
                <option value="controller">Контролёр</option>
                <option value="gip">ГИП</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-person-plus"></i> Зарегистрироваться</button>
    </form>
    {% endif %}
</div>

<script>
function toggleForm() {
    const lf = document.getElementById('loginForm');
    const rf = document.getElementById('registerForm');
    const title = document.getElementById('formTitle');
    const link = document.getElementById('toggleLink');
    if (rf.style.display === 'none') {
        rf.style.display = 'block';
        lf.style.display = 'none';
        title.textContent = 'Регистрация';
        link.textContent = 'Уже есть аккаунт? Войти';
    } else {
        rf.style.display = 'none';
        lf.style.display = 'block';
        title.textContent = 'Вход в систему';
        link.textContent = 'Нет аккаунта? Зарегистрируйтесь';
    }
}
</script>
</body>
</html>
